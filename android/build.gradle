// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP pinned to 8.13.0 to match Capacitor 8's bundled version
        // (@capacitor/android and @capacitor-cordova-android-plugins both
        // declare 8.13.0). AGP 9.x bumps issued by Android Studio Panda 4
        // are unsupported by Capacitor 8 and break the merged build.
        // Keep at 8.13.0 until Capacitor ships a release that supports AGP 9.
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
