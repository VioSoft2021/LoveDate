<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 220 280"
  width="64"
  height="82"
>
  <!-- Privé app icon: serif P + horizontal accent line above.
       Self-contained gradient (favicons load standalone, so the
       index.html's <linearGradient id="priveGold"> isn't available
       in this context). -->
  <defs>
    <linearGradient id="priveGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fceeb0" />
      <stop offset="22%" stop-color="#ead27a" />
      <stop offset="48%" stop-color="#d8b86d" />
      <stop offset="72%" stop-color="#b9974a" />
      <stop offset="100%" stop-color="#8b6b2c" />
    </linearGradient>
  </defs>
  <!-- Brand-signature horizontal accent line -->
  <line
    x1="22"
    y1="40"
    x2="198"
    y2="40"
    stroke="url(#priveGold)"
    stroke-width="8"
    stroke-linecap="round"
  />
  <!-- Cinzel serif P (uses platform serif fallback if Cinzel is
       unavailable in the favicon-loading context). -->
  <text
    x="110"
    y="235"
    font-family="Cinzel, Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="240"
    fill="url(#priveGold)"
    text-anchor="middle"
  >P</text>
</svg>
