<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#141937" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Privé" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Privé — exclusive AI-driven dating</title>
    <!-- Favicons: modern browsers prefer SVG; fall back to PNG. The
         apple-touch-icon is what iOS uses for home-screen install.
         Paths are relative to honor Vite's `base: './'` config so this
         works under GH Pages subpath + local dev + Capacitor file://. -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- Privé brand typography: Bodoni Moda for wordmark, Cinzel for the P
         icon, Cormorant Garamond italic for taglines. preconnect speeds up
         the font handshake. display=swap so text renders immediately in a
         fallback while the brand fonts download. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;800;900&family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Shared Privé brand gradient defs — referenced by url(#priveGold)
         from every logo SVG in the app. Inert (width/height = 0). -->
    <svg width="0" height="0" style="position: absolute; pointer-events: none;" aria-hidden="true">
      <defs>
        <linearGradient id="priveGold" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fceeb0" />
          <stop offset="22%" stop-color="#ead27a" />
          <stop offset="48%" stop-color="#d8b86d" />
          <stop offset="72%" stop-color="#b9974a" />
          <stop offset="100%" stop-color="#8b6b2c" />
        </linearGradient>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
